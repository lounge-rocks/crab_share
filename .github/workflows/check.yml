name: check

on:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo check
      - run: |
          cargo install --locked cargo-deny
          cargo deny check
