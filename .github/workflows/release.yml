name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Release binaries must be portable, so override .cargo/config's target-cpu=native.
  RUSTFLAGS: ""

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: crab_share-linux-x86_64.tar.gz
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: crab_share-linux-aarch64.tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: crab_share-macos-x86_64.tar.gz
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: crab_share-macos-aarch64.tar.gz
            use_cross: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with Cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --locked --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/${{ matrix.archive }}" crab_share

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          test -f dist/crab_share-linux-x86_64.tar.gz
          test -f dist/crab_share-linux-aarch64.tar.gz
          test -f dist/crab_share-macos-x86_64.tar.gz
          test -f dist/crab_share-macos-aarch64.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
